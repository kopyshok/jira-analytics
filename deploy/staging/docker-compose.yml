name: jira-analytics-staging

# Staging stack — same server as prod, different ports and volumes.
# Accessible at http://<server-ip>:8080 (HTTP only, no TLS).
# Auth cookie is set with Secure=false so it works over HTTP.
#
# Run: docker compose --env-file .env up -d

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jira_analytics_staging
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      TZ: Europe/Moscow
    volumes:
      - pgdata-staging:/var/lib/postgresql/data
    networks:
      - internal-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d jira_analytics_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  backend:
    image: ghcr.io/${GHCR_ORG}/jira-analytics:${APP_VERSION}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://app:${DB_PASSWORD}@postgres:5432/jira_analytics_staging"
      HF_HOME: /opt/hf-cache
    ports:
      # Staging is accessed directly on port 8080 — no TLS proxy.
      - "8080:8000"
    volumes:
      - app-data-staging:/app/data
    networks:
      - internal-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  pgdata-staging:
    name: pgdata-staging
  app-data-staging:
    name: app-data-staging

networks:
  internal-staging:
    driver: bridge
